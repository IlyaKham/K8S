apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nginx-app.fullname" . }}-config
  labels:
    {{- include "nginx-app.labels" . | nindent 4 }}
data:
  nginx.conf: |
{{ .Values.config.nginx.conf | indent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nginx-app.fullname" . }}-html
  labels:
    {{- include "nginx-app.labels" . | nindent 4 }}
data:
  index.html: |
{{ .Values.config.html.index | indent 4 }}